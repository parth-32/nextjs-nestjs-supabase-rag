# Render Blueprint — deploy both services from the monorepo root.
# Dashboard: New → Blueprint → connect this repo.
# After deploy, confirm Supabase Auth redirect URLs include your frontend URL.

services:
  - type: web
    name: compliance-copilot-api
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @ccp/shared build && pnpm --filter @ccp/backend build
    startCommand: pnpm --filter @ccp/backend start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: '22'
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: documents
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://compliance-copilot-web.onrender.com

  - type: web
    name: compliance-copilot-web
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @ccp/shared build && pnpm --filter @ccp/frontend build
    startCommand: pnpm --filter @ccp/frontend start
    envVars:
      - key: NODE_VERSION
        value: '22'
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://compliance-copilot-api.onrender.com
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
