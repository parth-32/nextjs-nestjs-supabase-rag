# Render Blueprint (Infrastructure as Code) for the Compliance Copilot backend.
# The frontend deploys separately to Vercel; Supabase is a managed dependency.
# Apply via the Render dashboard "New +" -> "Blueprint" pointing at this repo.
services:
  - type: web
    name: compliance-copilot-api
    runtime: node
    plan: starter
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @ccp/shared build && pnpm --filter @ccp/api build
    startCommand: pnpm --filter @ccp/api start:prod
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: 4000
      # CORS_ORIGINS must include your deployed Vercel URL.
      - key: CORS_ORIGINS
        sync: false
      # Secrets - set these in the Render dashboard (never commit them).
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: documents
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_EMBEDDING_MODEL
        value: gemini-embedding-001
      - key: GEMINI_GENERATION_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_EMBEDDING_DIM
        value: 768
