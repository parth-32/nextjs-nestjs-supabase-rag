# Render Blueprint (Infrastructure as Code) for the Compliance Copilot backend.
# The frontend deploys separately to Vercel; Supabase is a managed dependency.
# Apply via the Render dashboard "New +" -> "Blueprint" pointing at this repo.
services:
  - type: web
    name: compliance-copilot-api
    runtime: docker
    dockerfilePath: ./infra/Dockerfile.api
    dockerContext: .
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: 4000
      # CORS_ORIGINS must include your deployed Vercel URL.
      - key: CORS_ORIGINS
        sync: false
      # Secrets - set these in the Render dashboard (never commit them).
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: documents
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_EMBEDDING_MODEL
        value: gemini-embedding-001
      - key: GEMINI_GENERATION_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_EMBEDDING_DIM
        value: 768
      - key: RAG_TOP_K
        value: 5
      - key: RAG_MIN_SCORE
        value: 0.45
      - key: CHUNK_TARGET_TOKENS
        value: 800
      - key: CHUNK_OVERLAP_TOKENS
        value: 120
